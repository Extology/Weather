<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root{
    /* achtergrondkleur die matcht met de Tomorrow dark card */
    --bg: #17182B;
  }

  html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background: var(--bg);
    overflow:hidden;
  }

  /* centreer widget */
  .wrapper{
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: var(--bg);
  }

  /* optioneel: iets groter zodat er minder rand is */
  .widget{
    transform: scale(1.15);
    transform-origin: center;
  }
</style>
</head>

<body>
  <div class="wrapper">
    <div class="widget">

      <script>
        (function(d, s, id) {
            if (d.getElementById(id)) {
                if (window.__TOMORROW__) {
                    window.__TOMORROW__.renderWidget();
                }
                return;
            }
            const fjs = d.getElementsByTagName(s)[0];
            const js = d.createElement(s);
            js.id = id;
            js.src = "https://www.tomorrow.io/v1/widget/sdk/sdk.bundle.min.js";
            fjs.parentNode.insertBefore(js, fjs);
        })(document, 'script', 'tomorrow-sdk');
      </script>

      <div class="tomorrow"
        data-location-id="009025"
        data-language="EN"
        data-unit-system="METRIC"
        data-skin="dark"
        data-widget-type="upcoming"
        style="padding-bottom:22px;position:relative;">
        <a href="https://weather.tomorrow.io/" rel="nofollow noopener noreferrer" target="_blank"
          style="position:absolute; bottom:0; transform:translateX(-50%); left:50%;">
          <img alt="Powered by Tomorrow.io"
            src="https://weather-website-client.tomorrow.io/img/powered-by.svg"
            width="250" height="18" />
        </a>
      </div>

    </div>
  </div>
</body>
</html>
