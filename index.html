<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
}

/* container bepaalt de breedte */
.widget{
width:600px;
}

</style>

<script>
(function(d, s, id) {
if (d.getElementById(id)) {
if (window.__TOMORROW__) {
window.__TOMORROW__.renderWidget();
}
return;
}
const fjs = d.getElementsByTagName(s)[0];
const js = d.createElement(s);
js.id = id;
js.src = "https://www.tomorrow.io/v1/widget/sdk/sdk.bundle.min.js";
fjs.parentNode.insertBefore(js, fjs);
})(document, 'script', 'tomorrow-sdk');
</script>

</head>

<body>

<div class="widget">

<div class="tomorrow"
data-location-id="090025"
data-language="EN"
data-unit-system="METRIC"
data-skin="light"
data-widget-type="upcoming">
</div>

</div>

</body>
</html>
