<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weather</title>
  <style>
    :root{
      --bg:#000;
      --fg:#fff;
      --muted:rgba(255,255,255,.7);
      --line:rgba(255,255,255,.12);
    }
    html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    .wrap{height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;padding:48px;box-sizing:border-box;}
    .card{
      width:min(980px, 92vw);
      background:var(--bg);
      border:1px solid var(--line);
      border-radius:32px;
      padding:34px 34px 26px;
      box-sizing:border-box;
    }
    .top{display:flex;align-items:flex-start;justify-content:space-between;gap:28px;}
    .left .city{font-size:34px;font-weight:800;letter-spacing:.2px}
    .left .meta{margin-top:6px;color:var(--muted);font-size:18px}
    .temp{display:flex;align-items:center;gap:18px;}
    .temp .t{font-size:110px;font-weight:900;line-height:1;}
    .temp .desc{color:var(--muted);font-size:20px;margin-top:10px}
    .icon{width:92px;height:92px;flex:0 0 auto;}
    .grid{margin-top:26px;border-top:1px solid var(--line);padding-top:18px;display:grid;gap:14px}
    .row{display:grid;grid-template-columns:150px 70px 1fr 90px;align-items:center;gap:14px}
    .day{color:var(--muted);font-weight:700;font-size:18px}
    .mini{width:42px;height:42px;opacity:.95}
    .bar{height:12px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden}
    .fill{height:100%;background:#fff;width:50%}
    .hi{justify-self:end;font-weight:800;font-size:20px}
    .foot{margin-top:14px;color:rgba(255,255,255,.35);font-size:12px;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="left">
          <div class="city" id="city">Roeselare</div>
          <div class="meta" id="meta">Laden…</div>
        </div>
        <div class="temp">
          <svg class="icon" viewBox="0 0 64 64" id="bigIcon" aria-hidden="true"></svg>
          <div>
            <div class="t" id="temp">--°</div>
            <div class="desc" id="desc">…</div>
          </div>
        </div>
      </div>

      <div class="grid" id="forecast"></div>
      <div class="foot">Data: Open-Meteo</div>
    </div>
  </div>

<script>
  // Roeselare coords
  const LAT = 50.946, LON = 3.122;

  const WMO = (code)=>{
    // simpele icon set (zwart/wit): sun / cloud / rain / fog / snow
    const sun = `<circle cx="32" cy="32" r="10" fill="#fff"/><g stroke="#fff" stroke-width="3" stroke-linecap="round">
      <line x1="32" y1="4" x2="32" y2="14"/><line x1="32" y1="50" x2="32" y2="60"/>
      <line x1="4" y1="32" x2="14" y2="32"/><line x1="50" y1="32" x2="60" y2="32"/>
      <line x1="11" y1="11" x2="18" y2="18"/><line x1="46" y1="46" x2="53" y2="53"/>
      <line x1="11" y1="53" x2="18" y2="46"/><line x1="46" y1="18" x2="53" y2="11"/>
    </g>`;
    const cloud = `<path fill="#fff" d="M22 44h22a10 10 0 0 0 0-20 13 13 0 0 0-25-3A9 9 0 0 0 22 44z"/>`;
    const rain = cloud + `<g stroke="#fff" stroke-width="3" stroke-linecap="round">
      <line x1="24" y1="48" x2="20" y2="56"/><line x1="34" y1="48" x2="30" y2="56"/><line x1="44" y1="48" x2="40" y2="56"/>
    </g>`;
    const fog = `<g stroke="#fff" stroke-width="3" stroke-linecap="round">
      <line x1="12" y1="28" x2="52" y2="28"/><line x1="8" y1="36" x2="56" y2="36"/><line x1="12" y1="44" x2="52" y2="44"/>
    </g>`;
    const snow = cloud + `<g fill="#fff">
      <circle cx="22" cy="54" r="2"/><circle cx="32" cy="58" r="2"/><circle cx="42" cy="54" r="2"/>
    </g>`;

    if (code === 0) return sun;
    if ([1,2].includes(code)) return cloud;
    if (code === 3) return cloud;
    if ([45,48].includes(code)) return fog;
    if ([51,53,55,61,63,65,80,81,82].includes(code)) return rain;
    if ([71,73,75,85,86].includes(code)) return snow;
    return cloud;
  };

  const url =
    `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}` +
    `&current=temperature_2m,weather_code,wind_speed_10m` +
    `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
    `&timezone=Europe%2FBrussels`;

  fetch(url).then(r=>r.json()).then(d=>{
    const c = d.current;
    const t = Math.round(c.temperature_2m);
    const w = c.weather_code;
    const wind = Math.round(c.wind_speed_10m);

    document.getElementById("temp").textContent = `${t}°`;
    document.getElementById("desc").textContent = `Weercode ${w}`;
    document.getElementById("meta").textContent = `Wind ${wind} km/h • ${d.timezone}`;

    document.getElementById("bigIcon").innerHTML = WMO(w);

    const days = d.daily.time.slice(0,6).map((date,i)=>({
      date,
      code:d.daily.weather_code[i],
      hi:Math.round(d.daily.temperature_2m_max[i]),
      lo:Math.round(d.daily.temperature_2m_min[i]),
    }));

    const minAll = Math.min(...days.map(x=>x.lo));
    const maxAll = Math.max(...days.map(x=>x.hi));

    const forecast = document.getElementById("forecast");
    forecast.innerHTML = "";

    for (const day of days){
      const dt = new Date(day.date + "T00:00:00");
      const label = dt.toLocaleDateString("nl-BE",{weekday:"short", day:"2-digit", month:"2-digit"});
      const mid = (day.hi + day.lo)/2;
      const pct = (x)=> (maxAll===minAll?50:Math.max(0,Math.min(100, ((x-minAll)/(maxAll-minAll))*100 )));
      const width = pct(mid);

      const row = document.createElement("div");
      row.className = "row";
      row.innerHTML = `
        <div class="day">${label}</div>
        <svg class="mini" viewBox="0 0 64 64" aria-hidden="true">${WMO(day.code)}</svg>
        <div class="bar"><div class="fill" style="width:${width}%"></div></div>
        <div class="hi">${day.hi}°</div>
      `;
      forecast.appendChild(row);
    }
  }).catch(err=>{
    document.getElementById("meta").textContent = "Kon weerdata niet laden";
  });
</script>
</body>
</html>
