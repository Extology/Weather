<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>

html, body{
margin:0;
width:100%;
height:100%;
background:#000000;
overflow:hidden;
}

.stage{
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#000000;
overflow:hidden;
}

.crop{
width:100vw;
height:100vh;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
}

.scaler{
transform-origin:center;
will-change:transform;
}

</style>

</head>

<body>

<div class="stage">
<div class="crop">

<div class="scaler" id="scaler">

<script>
(function(d, s, id) {
if (d.getElementById(id)) {
if (window.__TOMORROW__) {
window.__TOMORROW__.renderWidget();
}
return;
}
const fjs = d.getElementsByTagName(s)[0];
const js = d.createElement(s);
js.id = id;
js.src = "https://www.tomorrow.io/v1/widget/sdk/sdk.bundle.min.js";
fjs.parentNode.insertBefore(js, fjs);
})(document, 'script', 'tomorrow-sdk');
</script>

<div class="tomorrow"
data-location-id="009025"
data-language="EN"
data-unit-system="METRIC"
data-skin="dark"
data-widget-type="upcoming"
style="padding-bottom:22px;position:relative;">
</div>

</div>

</div>
</div>

<script>

function fitWidget(){

const scaler = document.getElementById("scaler");

const widgetWidth = scaler.offsetWidth;
const widgetHeight = scaler.offsetHeight;

if(!widgetWidth || !widgetHeight) return;

const screenWidth = window.innerWidth;
const screenHeight = window.innerHeight;

const scale = Math.min(screenWidth/widgetWidth, screenHeight/widgetHeight) * 0.9;

scaler.style.transform = "scale(" + scale + ")";

}

function waitForWidget(){

fitWidget();

const scaler = document.getElementById("scaler");

if(scaler.offsetHeight < 100){
requestAnimationFrame(waitForWidget);
}

}

waitForWidget();

window.addEventListener("resize", fitWidget);
setInterval(fitWidget,2000);

</script>

</body>
</html>
